name: HTML to APK (SwipeClean Gallery)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          # إنشاء مشروع كوردوفا بالاسم المعرف للتطبيق
          cordova create SwipeClean com.whitefoxstudios.swipeclean SwipeClean
          cd SwipeClean
          cordova platform add android
          
          # حقن الصلاحيات بشكل آمن للتعامل مع الـ XML لأندرويد
          sed -i '/<\/widget>/i \    <config-file parent="/*" target="AndroidManifest.xml">\n        <uses-permission xmlns:android="http://android.com" android:name="android.permission.READ_EXTERNAL_STORAGE" />\n        <uses-permission xmlns:android="http://android.com" android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n        <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />\n    </config-file>' config.xml
          
          # تنظيف المجلد الافتراضي
          rm -rf www/*
          
          # نسخ ملف الـ index.html بشكل دقيق ومنفصل لمنع تكرار المجلدات
          if [ -f "../index.html" ]; then
            cp ../index.html www/index.html
          fi
          
          # دمج أيقونة التطبيق التلقائي إذا تم رفع صورة باسم icon.png
          if [ -f "../icon.png" ]; then
            cp ../icon.png www/icon.png
            sed -i '/<\/widget>/i \    <icon src="www/icon.png" \/>' config.xml
          fi
          
          # بناء التطبيق لملف APK
          cordova build android --device

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwipeClean-Gallery-APK
          path: SwipeClean/platforms/android/app/build/outputs/apk/debug/app-debug.apk
